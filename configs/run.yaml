defaults:
  - sampler: ding
  - task: latent_center

seed: 0
device: cuda:0
save_dir: out_folder  # "path/to/folder/to/save/experiment"

n_samples: 1
obs_std: 0.01
target_size: 768
# reference image
im_name: 
im_abs_path: assets/cat_hg.png # "path/to/ref/image"

model:
  name: sd3_latent
  parameters:
    pipeline: stabilityai/stable-diffusion-3.5-medium
    controlnet: alimama-creative/SD3-Controlnet-Inpainting

conditioning:
  ctx:
    - "a cat holding a sign"
  use_cfg: True
  guidance: 2.0

# set to False for grid search
use_context_parameters: True
task_name: ${hydra:runtime.choices.task}


# for computing patchwise / regular FID
eval:
  path_ref_stats_pfid: "path/to/ref/stats/fid" 
  batch_size: 50
  n_patch_per_img: 10
  patch_size: 256
  path_ref_stats_fid: "path/to/ref/stats/fid"


# used for PIE-bench
# used for DIV2K/PIE-bench dataset to provide context
path_captions: null
path_dir_masks: null
compute_clip: False

